spec_version: 1
name: data_janitor
type: space
runtime: fastapi
app: server.app:app
port: 8000

env_metadata:
  name: "data-janitor-env"
  description: "A Reinforcement Learning environment for autonomous data engineering. Agents must repair messy datasets (typing, imputation, and ML-readiness) to maximize downstream ML metrics without data leakage."
  version: "1.0.0"
  author: "Sharad Garg"

tasks:
  - id: easy
    name: "Credit Card Fraud Pipeline"
    description: "An unbalanced dataset of financial transactions. The agent must scale skewed numerical features and drop unhelpful identifiers to predict fraudulent activity."
    difficulty: easy
    max_steps: 20
    grader:
      type: programmatic
      script: grader.py

  - id: medium
    name: "Stroke Risk Assessment"
    description: "A mixed-type electronic health record dataset. The agent must handle hidden string-based missing values ('N/A') and encode categorical variables to predict stroke risk."
    difficulty: medium
    max_steps: 30
    grader:
      type: programmatic
      script: grader.py

  - id: hard
    name: "Corrupted Passenger Manifest (Spaceship Titanic)"
    description: "A heavily degraded sci-fi dataset with extreme missingness, boolean traps, and high-cardinality string identifiers. The agent must rigorously impute, encode, and prune to build a working prediction pipeline without leaking data."
    difficulty: hard
    max_steps: 40
    grader:
      type: programmatic
      script: grader.py